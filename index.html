<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Defence Civil Material Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs (v9 Compat Mode) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .sidebar-link.active { background: #2563eb; color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950 px-4">
        <div class="glass w-full max-w-md p-10 rounded-3xl text-center">
            <div class="mb-6">
                <div class="w-20 h-20 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-blue-500/30">
                    <i class="fas fa-shield-halved text-4xl text-white"></i>
                </div>
                <h1 class="text-3xl font-bold">Admin Hub</h1>
                <p class="text-slate-400 mt-2">Defence & Civil Materials</p>
            </div>
            <button onclick="loginWithGoogle()" class="w-full bg-white text-slate-900 font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-3 hover:bg-slate-100 transition-all duration-300">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-6" alt="Google">
                Continue with Google
            </button>
            <p id="auth-error" class="text-red-500 mt-4 text-sm hidden"></p>
        </div>
    </div>

    <!-- MAIN DASHBOARD CONTENT -->
    <div id="admin-panel" class="hidden min-h-screen flex">
        
        <!-- SIDEBAR -->
        <aside id="sidebar" class="w-72 glass border-r border-slate-800 fixed h-full lg:static z-50 transition-transform -translate-x-full lg:translate-x-0">
            <div class="p-8">
                <h2 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">HUB PANEL</h2>
            </div>
            <nav class="px-4 space-y-2">
                <button onclick="showSection('dashboard')" class="sidebar-link active w-full flex items-center gap-4 p-4 rounded-xl transition-all">
                    <i class="fas fa-grid-2"></i> Dashboard
                </button>
                <button onclick="showSection('add')" class="sidebar-link w-full flex items-center gap-4 p-4 rounded-xl transition-all">
                    <i class="fas fa-plus-circle"></i> Add Material
                </button>
                <button onclick="showSection('manage')" class="sidebar-link w-full flex items-center gap-4 p-4 rounded-xl transition-all">
                    <i class="fas fa-layer-group"></i> Manage All
                </button>
                <button onclick="logout()" class="w-full flex items-center gap-4 p-4 rounded-xl text-red-400 hover:bg-red-500/10 mt-10">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </nav>
        </aside>

        <!-- MAIN AREA -->
        <main class="flex-1 h-screen overflow-y-auto p-6 lg:p-10">
            <!-- Top Nav -->
            <div class="flex justify-between items-center mb-10">
                <button class="lg:hidden text-2xl" onclick="toggleSidebar()"><i class="fas fa-bars-staggered"></i></button>
                <h2 id="page-title" class="text-2xl font-bold">Overview</h2>
                <div id="user-info" class="flex items-center gap-3 glass py-2 px-4 rounded-full">
                    <img id="admin-photo" src="" class="w-8 h-8 rounded-full border-2 border-blue-500">
                    <span id="admin-name" class="text-sm font-medium">Admin</span>
                </div>
            </div>

            <!-- DASHBOARD SECTION -->
            <div id="section-dashboard" class="content-section space-y-8">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="glass p-6 rounded-3xl">
                        <i class="fas fa-file-pdf text-blue-500 text-3xl mb-4"></i>
                        <p class="text-slate-400 text-sm">Materials</p>
                        <h3 id="stat-count" class="text-3xl font-bold">0</h3>
                    </div>
                    <div class="glass p-6 rounded-3xl">
                        <i class="fas fa-eye text-emerald-500 text-3xl mb-4"></i>
                        <p class="text-slate-400 text-sm">Total Views</p>
                        <h3 id="stat-views" class="text-3xl font-bold">0</h3>
                    </div>
                    <div class="glass p-6 rounded-3xl">
                        <i class="fas fa-download text-orange-500 text-3xl mb-4"></i>
                        <p class="text-slate-400 text-sm">Downloads</p>
                        <h3 id="stat-downloads" class="text-3xl font-bold">0</h3>
                    </div>
                    <div class="glass p-6 rounded-3xl">
                        <i class="fas fa-chart-line text-purple-500 text-3xl mb-4"></i>
                        <p class="text-slate-400 text-sm">Daily Traffic</p>
                        <h3 class="text-3xl font-bold">Live</h3>
                    </div>
                </div>

                <div class="glass rounded-3xl p-6">
                    <h3 class="text-xl font-bold mb-6">Recent Activities</h3>
                    <div id="recent-list" class="space-y-4">
                        <!-- Items via JS -->
                    </div>
                </div>
            </div>

            <!-- ADD / EDIT SECTION -->
            <div id="section-add" class="content-section hidden">
                <div class="glass max-w-3xl mx-auto p-8 rounded-3xl">
                    <form id="material-form" class="space-y-5">
                        <input type="hidden" id="edit-id">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-2">Material Title (e.g., SSC GD History Notes)</label>
                            <input type="text" id="m-title" required class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-2">Format</label>
                                <select id="m-format" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 outline-none">
                                    <option value="PDF">PDF Document</option>
                                    <option value="Notes">Digital Notes</option>
                                    <option value="PYQ">Previous Year Paper</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-2">Target Year</label>
                                <input type="number" id="m-year" placeholder="2024" required class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-2">Google Drive URL (View/Download Link)</label>
                            <input type="url" id="m-link" required class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-2">Thumbnail Image URL</label>
                            <input type="url" id="m-thumbnail" required class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 outline-none">
                        </div>
                        <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold shadow-lg transition-all flex items-center justify-center gap-3">
                            <span id="btn-text">Publish Material</span>
                            <div id="loader" class="hidden loader w-5 h-5 border-2 border-white rounded-full"></div>
                        </button>
                    </form>
                </div>
            </div>

            <!-- MANAGE SECTION -->
            <div id="section-manage" class="content-section hidden">
                <div class="mb-6">
                    <input type="text" id="search" oninput="renderManageGrid()" placeholder="Search by title..." class="w-full max-w-md bg-slate-800 border border-slate-700 rounded-xl px-5 py-3 outline-none">
                </div>
                <div id="manage-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
                    <!-- Cards via JS -->
                </div>
            </div>

        </main>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed bottom-10 right-10 transform translate-y-32 opacity-0 transition-all duration-500 glass border-l-4 border-blue-500 p-4 rounded-xl z-[200]">
        <p id="toast-msg" class="font-medium"></p>
    </div>

    <script>
        // --- CONFIGURATION ---
        const firebaseConfig = {
  apiKey: "AIzaSyD3HWJgHHPDlVFRgzNXfLzp415HlnBYLac",
  authDomain: "defence-civil-hub.firebaseapp.com",
  projectId: "defence-civil-hub",
  storageBucket: "defence-civil-hub.firebasestorage.app",
  messagingSenderId: "137417211396",
  appId: "1:137417211396:web:782d9e34de16f8d50a7f51",
  measurementId: "G-JS72XY2K4B"
};

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        let materials = [];
        let isEditing = false;

        // --- AUTHENTICATION ---
        function loginWithGoogle() {
            auth.signInWithPopup(provider).catch(err => {
                document.getElementById('auth-error').innerText = err.message;
                document.getElementById('auth-error').classList.remove('hidden');
            });
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('admin-name').innerText = user.displayName;
                document.getElementById('admin-photo').src = user.photoURL;
                initData();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
            }
        });

        function logout() { auth.signOut(); }

        // --- CORE FUNCTIONS ---
        function initData() {
            db.collection("materials").orderBy("timestamp", "desc").onSnapshot(snap => {
                materials = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                updateDashboard();
                renderManageGrid();
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
            
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const titles = { 'dashboard': 'Overview', 'add': isEditing ? 'Edit Material' : 'Add Material', 'manage': 'Manage Materials' };
            document.getElementById('page-title').innerText = titles[id];

            if (window.innerWidth < 1024) toggleSidebar(); // Mobile auto-hide
            if (id !== 'add') resetForm();
        }

        function resetForm() {
            isEditing = false;
            document.getElementById('material-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('btn-text').innerText = "Publish Material";
        }

        // --- CRUD ---
        document.getElementById('material-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const loader = document.getElementById('loader');
            
            btn.disabled = true;
            loader.classList.remove('hidden');

            const data = {
                title: document.getElementById('m-title').value,
                format: document.getElementById('m-format').value,
                year: document.getElementById('m-year').value,
                link: document.getElementById('m-link').value,
                thumbnail: document.getElementById('m-thumbnail').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                if (isEditing) {
                    await db.collection("materials").doc(document.getElementById('edit-id').value).update(data);
                    showToast("Updated successfully!");
                } else {
                    data.views = 0;
                    data.downloads = 0;
                    await db.collection("materials").add(data);
                    showToast("Published successfully!");
                }
                showSection('manage');
            } catch (err) {
                showToast(err.message, "red");
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        });

        async function deleteMaterial(id) {
            if(confirm("Are you sure? This cannot be undone.")) {
                await db.collection("materials").doc(id).delete();
                showToast("Deleted successfully!");
            }
        }

        function editMaterial(id) {
            const m = materials.find(x => x.id === id);
            isEditing = true;
            showSection('add');
            document.getElementById('edit-id').value = id;
            document.getElementById('m-title').value = m.title;
            document.getElementById('m-format').value = m.format;
            document.getElementById('m-year').value = m.year;
            document.getElementById('m-link').value = m.link;
            document.getElementById('m-thumbnail').value = m.thumbnail;
            document.getElementById('btn-text').innerText = "Update Changes";
        }

        // --- UI RENDERING ---
        function updateDashboard() {
            document.getElementById('stat-count').innerText = materials.length;
            document.getElementById('stat-views').innerText = materials.reduce((a, b) => a + (b.views || 0), 0);
            document.getElementById('stat-downloads').innerText = materials.reduce((a, b) => a + (b.downloads || 0), 0);

            const recent = materials.slice(0, 4);
            document.getElementById('recent-list').innerHTML = recent.map(m => `
                <div class="flex items-center justify-between p-4 bg-slate-800/40 rounded-2xl">
                    <div class="flex items-center gap-4">
                        <img src="${m.thumbnail}" class="w-12 h-12 rounded-lg object-cover">
                        <div>
                            <h4 class="font-medium text-sm">${m.title}</h4>
                            <p class="text-xs text-slate-500">${m.format} • ${m.year}</p>
                        </div>
                    </div>
                    <span class="text-xs text-blue-400 font-bold">LIVE</span>
                </div>
            `).join('');
        }

        function renderManageGrid() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = materials.filter(m => m.title.toLowerCase().includes(query));
            
            document.getElementById('manage-grid').innerHTML = filtered.map(m => `
                <div class="glass rounded-3xl overflow-hidden group">
                    <div class="h-40 relative">
                        <img src="${m.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent"></div>
                        <span class="absolute bottom-3 left-3 bg-blue-600 text-[10px] font-bold px-2 py-1 rounded-md">${m.format}</span>
                    </div>
                    <div class="p-5">
                        <h4 class="font-bold truncate mb-4">${m.title} (${m.year})</h4>
                        <div class="flex gap-2">
                            <button onclick="editMaterial('${m.id}')" class="flex-1 bg-slate-700 hover:bg-slate-600 py-2 rounded-xl text-xs transition">Edit</button>
                            <button onclick="deleteMaterial('${m.id}')" class="px-4 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white py-2 rounded-xl text-xs transition">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showToast(msg, color = "blue") {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.style.borderLeftColor = color === "blue" ? "#3b82f6" : "#ef4444";
            t.classList.remove('translate-y-32', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-32', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
